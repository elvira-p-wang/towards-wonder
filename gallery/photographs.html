<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Photographs | Towards Wonder
  </title>

  <meta
    name="description"
    content="Quiet observations across different places — an editorial photography exhibition."
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="../style.css">
</head>


<body class="gallery-page">

  <!-- Subtle site texture -->

  <div class="grain"></div>


  <!-- Navigation -->

  <header class="nav gallery-page-nav">

    <a
      href="../index.html"
      class="logo"
      aria-label="Return to the Towards Wonder homepage"
    >
      <img src="../images/logo.png" alt="Towards Wonder">
    </a>

    <nav aria-label="Gallery page navigation">
      <a href="../index.html#gallery">Gallery</a>
      <a href="../index.html#explore">Explore</a>
      <a href="../index.html#about-me">About</a>
    </nav>

  </header>


  <!-- Exhibition -->

  <main class="gallery-exhibition">

    <header class="exhibit-header exhibit-header--rooms">

      <a href="../index.html#gallery" class="exhibit-back">
        ← Back to gallery
      </a>

      <h1>Photographs.</h1>

    </header>

    <!--
      One room per collection, switched horizontally — see
      CLAUDE.md → "Gallery architecture" → "Room switcher".
      Editor's Selection and Details are intentionally not part of
      this rotation; their data stays in photographs-data.js if
      they're ever needed again.
    -->
    <nav class="room-nav" aria-label="Photograph collections"></nav>

    <div class="room-stage" id="room-stage"></div>

  </main>


  <!-- Footer -->

  <footer class="article-footer">

    <a href="../index.html#gallery">
      ← Return to the gallery
    </a>

    <p>© 2026 Elvira Wang.</p>

  </footer>


  <script src="data/photographs-rooms.js"></script>
  <script src="data/photographs-data.js"></script>
  <script src="gallery.js"></script>
  <script src="rooms.js"></script>
  <script>
    TowardsWonderGallery.initRooms(
      window.PHOTOGRAPHS_DATA,
      window.PHOTOGRAPHS_ROOM_ORDER,
      ".room-nav",
      "#room-stage",
      "masonry"
    );
  </script>

  <script src="../cursor.js"></script>
  <script src="../fox.js"></script>

</body>

</html>
