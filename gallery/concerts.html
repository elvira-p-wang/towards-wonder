<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Concerts | Towards Wonder
  </title>

  <meta
    name="description"
    content="Moments carried by music — a photography exhibition."
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="../style.css">
</head>


<body class="gallery-page">

  <!-- Subtle site texture -->

  <div class="grain"></div>


  <!-- Navigation -->

  <header class="nav gallery-page-nav">

    <a
      href="../index.html"
      class="logo"
      aria-label="Return to the Towards Wonder homepage"
    >
      <img src="../images/logo.png" alt="Towards Wonder">
    </a>

    <nav aria-label="Gallery page navigation">
      <a href="../index.html#gallery">Gallery</a>
      <a href="../index.html#explore">Explore</a>
      <a href="../index.html#about-me">About</a>
    </nav>

  </header>


  <!-- Exhibition -->

  <main class="gallery-exhibition">

    <header class="exhibit-header">

      <a href="../index.html#gallery" class="exhibit-back">
        ← Back to gallery
      </a>

      <h1>Concerts.</h1>

      <p class="exhibit-subtitle">Moments carried by music.</p>

    </header>

    <!--
      Unlike Photographs and Drawings, Concerts has no subcategories
      (see CLAUDE.md → "Gallery architecture") — so no room-switcher
      here, just the one collection's grid, rendered via
      gallery.js's renderCollections() straight into this root. Same
      masonry layout, lightbox, lazy loading and animations as
      Photographs (mode "masonry"), just without the room chrome.
    -->
    <div class="exhibit-collections"></div>

  </main>


  <!-- Footer -->

  <footer class="article-footer">

    <a href="../index.html#gallery">
      ← Return to the gallery
    </a>

    <p>© 2026 Elvira Wang.</p>

  </footer>


  <script src="data/concerts-data.js"></script>
  <script src="gallery.js"></script>
  <script>
    TowardsWonderGallery.renderCollections(
      window.CONCERTS_DATA,
      ".exhibit-collections",
      "masonry"
    );
  </script>

  <script src="../cursor.js"></script>
  <script src="../fox.js"></script>

</body>

</html>
